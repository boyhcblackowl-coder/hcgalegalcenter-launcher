<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Nama yang tampil di bawah ikon -->
  <meta name="apple-mobile-web-app-title" content="HCGA Center" />
  <meta name="application-name" content="HCGA Center" />

  <!-- Biar mode homescreen terasa seperti app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Ikon iOS Home Screen -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <!-- Opsional Android -->
  <link rel="icon" href="favicon.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <title>HCGA Legal Center</title>

  <style>
    body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial; padding: 24px; line-height: 1.4; }
    .btn { display:inline-block; padding:12px 16px; border-radius:12px; border:1px solid #ddd; text-decoration:none; }
    .muted { opacity: .7; font-size: 14px; }
  </style>
</head>
<body>
  <h2>HCGA & Legal Center</h2>
  <p class="muted">Jika kamu membuka dari ikon Home Screen, halaman akan otomatis masuk ke portal.</p>

  <p><a class="btn" href="https://sites.google.com/view/hcgalegalcenter/home">Buka Portal</a></p>

  <script>
    const TARGET = "https://sites.google.com/view/hcgalegalcenter/home";
    const isStandalone =
      window.matchMedia?.("(display-mode: standalone)").matches ||
      window.navigator.standalone === true; // iOS lama

    if (isStandalone) {
      window.location.replace(TARGET);
    }
  </script>
</body>
</html>
